[meta]
title = "My Presentation"
author = "wipkat"
theme = "light"      # dark | light | terminal | paper
transition = "fade"  # global default: fade | slide | zoom | none (or any plugin name)

# Uncomment to override individual theme values:
# [theme]
# accent = "#e11d48"
# font_heading = "Georgia, serif"

[[slide]]
id = "intro"
layout = "title"
transition = "zoom"

  [slide.content]
  heading = "Hello World"
  subheading = "A presentation tool built with Claude"
  notes = "Start with a warm welcome. Mention what we'll cover today."

[[slide]]
id = "overview"
layout = "bullets"

  [slide.content]
  heading = "What We'll Cover"
  heading_animate = "fade-up"
  notes = "Keep this brief — one sentence per topic."

  [[slide.content.bullets]]
  text = "First topic"
  animate = "fade-up"
  delay = 100

  [[slide.content.bullets]]
  text = "Second topic"
  animate = "fade-up"
  delay = 200
  fragment = true

  [[slide.content.bullets]]
  text = "Third topic"
  animate = "fade-up"
  delay = 300
  fragment = true

[[slide]]
id = "split-demo"
layout = "split"
transition = "zoom"

  [slide.content]
  heading = "Two Columns"
  left = "Left side content goes here."
  right = "Right side content goes here."
  notes = "Use this layout for comparisons."

[[slide]]
id = "counter-demo"
layout = "custom"
module = "modules/Counter.jsx"

  [slide.content]
  heading = "Interactive Counter"
  start = 0
  notes = "Demo of a custom module. Click +/- or reset."

[[slide]]
id = "fin"
layout = "title"

  [slide.content]
  heading = "Thank You"
  subheading = "Questions?"
